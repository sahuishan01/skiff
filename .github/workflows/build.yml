name: Build & Release Skiff Client

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build-kotlin-app:
    name: Build Kotlin App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle Dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Android App (Release APK)
        run: |
          cd trans_decoder_app
          # Generate gradle wrapper dynamically inside CI environment
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleRelease
          
          # Find compiled release APK and place it in the target release directory
          mkdir -p app/build/outputs/apk/release
          find app/build/outputs/apk/ -name "*.apk" -exec cp {} app/build/outputs/apk/release/app-release.apk \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v0.0.1
          name: Release v0.0.1
          draft: false
          prerelease: false
          files: |
            trans_decoder_app/app/build/outputs/apk/release/app-release.apk
          token: ${{ secrets.GITHUB_TOKEN }}
