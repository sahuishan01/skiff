name: Build & Release Skiff Client

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build-kotlin-app:
    name: Build Kotlin App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build Android App (Release APK)
        run: |
          cd trans_decoder_app
          # Generate gradle wrapper dynamically using Gradle 8.4
          gradle wrapper
          chmod +x gradlew
          # Capture output to log file to allow remote debugging on failure
          ./gradlew assembleRelease > ../build.log 2>&1
          
          # Find compiled release APK and place it in the target release directory
          mkdir -p app/build/outputs/apk/release
          find app/build/outputs/apk/ -name "*.apk" -exec cp {} app/build/outputs/apk/release/app-release.apk \;

      - name: Push Build Log on Failure
        if: failure()
        run: |
          git config user.name "Skiff Developer"
          git config user.email "developer@skiff.p2p"
          # Create and force-push to a debug branch (force recreate if exists)
          git checkout -B ci-debug
          cp build.log ci_build_error.log || true
          git add ci_build_error.log
          git commit -m "Upload failed build logs for debug"
          git push -f origin ci-debug

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v0.0.11
          name: Release v0.0.11
          draft: false
          prerelease: false
          files: |
            trans_decoder_app/app/build/outputs/apk/release/app-release.apk
          token: ${{ secrets.GITHUB_TOKEN }}
